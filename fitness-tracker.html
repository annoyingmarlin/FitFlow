<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FitFlow — Daily Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0f11;--surface:#17191d;--surface2:#1e2026;--border:#2a2d35;
    --accent:#c8f55a;--accent2:#ff6b6b;--accent3:#5af5c8;
    --text:#f0f2f5;--muted:#6b7280;--muted2:#9ca3af;--warn:#fbbf24;
    --font-head:'Syne',sans-serif;--font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
    --radius:14px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100dvh;overflow-x:hidden}
  #app{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

  /* Header */
  .header{padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:var(--bg)}
  .header-title{font-family:var(--font-head);font-size:20px;font-weight:800;letter-spacing:-.5px}
  .header-title span{color:var(--accent)}
  .header-right{display:flex;align-items:center;gap:10px}
  .profile-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:border-color .2s;flex-shrink:0}
  .profile-btn.has-profile{border-color:var(--accent)}
  .profile-btn:active{opacity:.7}
  .btn-back{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px}
  .btn-back:active{opacity:.7}

  /* Pages */
  .page{display:none;flex:1;padding:16px 16px 100px;animation:fadeUp .22s ease}
  .page.active{display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* Calendar */
  .cal-header{display:flex;align-items:center;justify-content:space-between;padding:0 4px 14px}
  .cal-month{font-family:var(--font-head);font-size:22px;font-weight:800}
  .cal-nav-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-dow{text-align:center;padding:6px 0;font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:.5px}
  .cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;font-family:var(--font-mono);font-size:13px;transition:background .15s}
  .cal-day:active{transform:scale(.92)}
  .cal-day.empty{cursor:default}
  .cal-day.today{background:var(--surface2);border:1px solid var(--accent);color:var(--accent)}
  .cal-day.past{color:var(--muted2)}
  .cal-day:not(.empty):hover{background:var(--surface2)}
  .cal-day.goal-met{background:rgba(200,245,90,.1)}
  .cal-check{display:none;position:absolute;top:2px;right:3px;font-size:9px;color:var(--accent);font-weight:700}
  .cal-day.goal-met .cal-check{display:block}
  .cal-dot{width:4px;height:4px;border-radius:50%;background:var(--muted);position:absolute;bottom:4px}
  .cal-day.goal-met .cal-dot{background:var(--accent)}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
  .card-title{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .card-title .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block}
  .card-title .dot.red{background:var(--accent2)}
  .card-title .dot.teal{background:var(--accent3)}
  .card-title .dot.purple{background:#a78bfa}

  /* Inputs */
  .input-row{display:flex;gap:8px;margin-bottom:10px}
  .input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .2s}
  .input:focus{border-color:var(--accent)}
  .input::placeholder{color:var(--muted)}
  select.input{appearance:none}
  .btn{padding:10px 16px;border-radius:var(--radius-sm);font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:.3px;cursor:pointer;border:none;transition:opacity .15s,transform .1s;white-space:nowrap}
  .btn:active{opacity:.8;transform:scale(.97)}
  .btn-accent{background:var(--accent);color:#0e0f11}
  .btn-full{width:100%;text-align:center;padding:13px}
  .btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
  .btn-danger{background:#3d1515;border:1px solid #7b2020;color:var(--accent2)}
  .btn-sm{padding:6px 11px;font-size:11px}

  /* Exercise */
  .exercise-block{margin-bottom:14px}
  .exercise-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .exercise-name{font-family:var(--font-head);font-size:15px;font-weight:700}
  .exercise-stats{font-family:var(--font-mono);font-size:12px;color:var(--muted2)}
  .exercise-stats strong{color:var(--accent);font-size:14px}
  .progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:6px 0 10px}
  .progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent3),var(--accent));transition:width .4s cubic-bezier(.34,1.56,.64,1)}
  .progress-fill.done{background:var(--accent)}
  .rep-input-row{display:flex;gap:8px;align-items:center}
  .rep-history{margin-top:8px}
  .rep-entry{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:12px;color:var(--muted2)}
  .rep-entry:last-child{border-bottom:none}
  .rep-del{cursor:pointer;color:var(--accent2);font-size:14px;line-height:1}

  /* Meals */
  .meal-section{margin-bottom:14px}
  .meal-label{font-size:12px;font-family:var(--font-mono);color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  .food-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
  .food-item:last-child{border-bottom:none}
  .food-macros{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
  .food-cals{font-family:var(--font-mono);color:var(--accent2);font-size:12px}

  /* Macro pills */
  .macro-pills{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .macro-pill{flex:1;min-width:60px;background:var(--surface2);border-radius:var(--radius-sm);padding:9px 6px;text-align:center}
  .macro-pill .mv{font-family:var(--font-mono);font-size:15px;font-weight:500}
  .macro-pill .ml{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
  .mv.c{color:var(--accent2)}.mv.p{color:var(--accent3)}.mv.ca{color:var(--warn)}.mv.f{color:#a78bfa}

  /* Progress stats */
  .progress-stat{background:var(--surface2);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
  .progress-stat-label{font-size:13px;color:var(--muted2)}
  .progress-stat-val{font-family:var(--font-mono);font-size:16px;font-weight:500}

  /* Fat card */
  .fat-card{background:linear-gradient(135deg,#1a1f12,#232b14);border:1px solid #3a4a20;border-radius:var(--radius);padding:20px;margin-bottom:12px}
  .fat-card h3{font-family:var(--font-head);font-size:15px;font-weight:800;margin-bottom:14px;color:var(--accent)}
  .pound-track{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .pound-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--font-mono);border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .3s}
  .pound-dot.filled{background:var(--accent);color:#0e0f11;border-color:var(--accent);font-weight:700}

  /* Achievement banners */
  .achievement{border-radius:var(--radius);padding:13px 16px;margin-bottom:10px;font-family:var(--font-head);font-size:13px;font-weight:700;line-height:1.5;animation:pulse 2.5s ease infinite}
  .achievement.streak{background:linear-gradient(135deg,#1a2635,#0f2040);border:1px solid #2a4a80;color:#60a5fa}
  .achievement.loss{background:linear-gradient(135deg,#1f1a10,#2a2408);border:1px solid #6a5a10;color:var(--warn)}
  .achievement.month{background:linear-gradient(135deg,#1a2a1a,#0f2010);border:1px solid #2a6a2a;color:var(--accent)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.8}}

  /* Profile */
  .profile-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--surface2),var(--surface));border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 14px}
  .profile-name{font-family:var(--font-head);font-size:22px;font-weight:800;text-align:center;margin-bottom:4px}
  .profile-sub{font-size:12px;color:var(--muted2);text-align:center;font-family:var(--font-mono);margin-bottom:20px}
  .macro-targets{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
  .macro-target{background:var(--surface2);border-radius:var(--radius-sm);padding:12px}
  .macro-target .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
  .macro-target .value{font-family:var(--font-mono);font-size:18px;font-weight:500}
  .macro-target .value.c{color:var(--accent2)}.macro-target .value.p{color:var(--accent3)}
  .macro-target .value.ca{color:var(--warn)}.macro-target .value.f{color:#a78bfa}
  .divider{height:1px;background:var(--border);margin:14px 0}
  .info-box{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px}
  .info-box .label{font-size:11px;color:var(--muted);margin-bottom:6px}

  /* Food Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:430px;padding:20px 18px 36px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.67,0)}
  .modal-overlay.open .modal{transform:translateY(0);transition:transform .35s cubic-bezier(.34,1.2,.64,1)}
  .modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px}
  .modal-title{font-family:var(--font-head);font-size:17px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .modal-title .meal-tag{font-size:12px;background:var(--surface2);border-radius:20px;padding:3px 10px;color:var(--muted2);font-family:var(--font-mono);font-weight:400}

  /* Food search */
  .food-search-wrap{position:relative;margin-bottom:12px}
  .food-search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;transition:border-color .2s}
  .food-search-input:focus{border-color:var(--accent)}
  .food-search-input::placeholder{color:var(--muted)}
  .food-suggestions{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);z-index:600;max-height:200px;overflow-y:auto;display:none}
  .food-suggestions.show{display:block}
  .food-sugg-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
  .food-sugg-item:last-child{border-bottom:none}
  .food-sugg-item:active,.food-sugg-item:hover{background:var(--surface2)}
  .food-sugg-name{font-size:14px}
  .food-sugg-meta{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:2px}

  .modal-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .modal-field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:4px}
  .modal-field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 10px;color:var(--text);font-family:var(--font-mono);font-size:14px;outline:none;transition:border-color .2s}
  .modal-field input:focus{border-color:var(--accent)}
  .modal-field.full{grid-column:1/-1}
  .modal-btns{display:flex;gap:8px}

  .new-ex-form{background:var(--surface2);border-radius:var(--radius-sm);padding:12px;margin-top:10px}
  .toggle-btn{width:100%;background:none;border:1px dashed var(--border);color:var(--muted2);padding:10px;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
  .toggle-btn:active{opacity:.7}

  /* Day header */
  .day-header{text-align:center;padding:10px 0 16px}
  .day-date-big{font-family:var(--font-head);font-size:26px;font-weight:800;letter-spacing:-1px}
  .day-date-sub{font-size:12px;color:var(--muted2);font-family:var(--font-mono);margin-top:2px}

  /* Empty state */
  .empty-state{text-align:center;padding:28px 20px;color:var(--muted);font-size:14px}
  .empty-state .emoji{font-size:30px;margin-bottom:10px}

  /* Toast */
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#0e0f11;padding:12px 22px;border-radius:50px;font-family:var(--font-head);font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* Bottom Nav */
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:8px 0 12px;z-index:200}
  .bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0}
  .bottom-nav-item .icon{font-size:20px;line-height:1}
  .bottom-nav-item .label{font-size:10px;font-family:var(--font-mono);color:var(--muted);letter-spacing:.3px}
  .bottom-nav-item.active .label{color:var(--accent)}
  .bottom-nav-item.active .icon{filter:drop-shadow(0 0 6px var(--accent))}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header" id="mainHeader">
    <div class="header-title">Fit<span>Flow</span></div>
    <div class="header-right">
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)" id="headerDate"></div>
      <div class="profile-btn" id="profileBtn" onclick="openProfile()" title="Profile">👤</div>
    </div>
  </div>

  <!-- PROGRESS PAGE (home) -->
  <div class="page active" id="pageProgress">
    <div id="achievementBanners"></div>
    <div class="fat-card" id="fatCard"></div>
    <div class="card">
      <div class="card-title"><span class="dot"></span>Exercise Totals</div>
      <div id="exerciseTotals"></div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot red"></span>Calorie Totals</div>
      <div id="calorieTotals"></div>
    </div>
  </div>

  <!-- TODAY / DAILY PAGE -->
  <div class="page" id="pageDaily">
    <div class="day-header">
      <div class="day-date-big" id="dailyDateBig"></div>
      <div class="day-date-sub" id="dailyDateSub"></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot"></span>Exercise</div>
      <div id="exerciseList"></div>
      <button class="toggle-btn" onclick="toggleNewExForm()">＋ Add Exercise</button>
      <div class="new-ex-form" id="newExForm" style="display:none">
        <div class="input-row">
          <input class="input" id="newExName" placeholder="Exercise name">
          <input class="input" id="newExGoal" placeholder="Goal reps" type="number" style="max-width:90px">
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-accent" onclick="addExercise()" style="flex:1">Create</button>
          <button class="btn btn-ghost" onclick="toggleNewExForm()">Cancel</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot red"></span>Calories &amp; Macros</div>
      <div class="info-box" id="dailyGoalDisplay"></div>
      <div class="macro-pills" id="macroPills"></div>
      <div id="mealSections"></div>
    </div>
  </div>

  <!-- CALENDAR PAGE -->
  <div class="page" id="pageCalendar">
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month" id="calMonthLabel"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dow">Su</div><div class="cal-dow">Mo</div>
      <div class="cal-dow">Tu</div><div class="cal-dow">We</div>
      <div class="cal-dow">Th</div><div class="cal-dow">Fr</div>
      <div class="cal-dow">Sa</div>
    </div>
    <div class="cal-grid" id="calDays"></div>
    <div style="margin-top:20px">
      <div class="card-title" style="padding:0 4px 10px"><span class="dot"></span>This Month</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="monthStats"></div>
    </div>
  </div>

  <!-- PROFILE PAGE -->
  <div class="page" id="pageProfile">
    <div style="padding-top:6px">
      <div class="profile-avatar" id="profileAvatar">👤</div>
      <div class="profile-name" id="profileDisplayName">Your Profile</div>
      <div class="profile-sub" id="profileDisplaySub">Set up your info to get personalized targets</div>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot purple"></span>Personal Info</div>
      <div class="input-row">
        <input class="input" id="pName" placeholder="Your name">
      </div>
      <div class="input-row">
        <select class="input" id="pSex">
          <option value="">Sex</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
        <input class="input" id="pAge" type="number" placeholder="Age">
      </div>
      <div class="input-row">
        <input class="input" id="pWeight" type="number" placeholder="Weight (lbs)">
        <input class="input" id="pHeightFt" type="number" placeholder='Feet (e.g. 5)' min="3" max="8">
        <input class="input" id="pHeightIn" type="number" placeholder='Inches (e.g. 10)' min="0" max="11">
      </div>
      <div class="info-box" style="margin-bottom:12px">
        <div class="label">Activity Level</div>
        <select class="input" id="pActivity" style="margin-top:4px">
          <option value="1.2">Sedentary (little/no exercise)</option>
          <option value="1.375">Lightly Active (1–3 days/wk)</option>
          <option value="1.55" selected>Moderately Active (3–5 days/wk)</option>
          <option value="1.725">Very Active (6–7 days/wk)</option>
          <option value="1.9">Extremely Active (hard daily training)</option>
        </select>
      </div>
      <button class="btn btn-accent btn-full" onclick="saveProfile()">Save &amp; Calculate Targets</button>
    </div>

    <div class="card" id="profileTargetsCard" style="display:none">
      <div class="card-title"><span class="dot teal"></span>Your Daily Targets</div>
      <div id="profileTargets"></div>
      <div class="divider"></div>
      <div style="font-size:12px;color:var(--muted);line-height:1.8" id="profileFormula"></div>
    </div>
  </div>

  <!-- BOTTOM NAV: Progress · Today · Calendar -->
  <div class="bottom-nav">
    <div class="bottom-nav-item active" onclick="showTab('progress',this)" id="nav-progress">
      <div class="icon">📊</div><div class="label">Progress</div>
    </div>
    <div class="bottom-nav-item" onclick="gotoToday()" id="nav-today">
      <div class="icon">⚡</div><div class="label">Today</div>
    </div>
    <div class="bottom-nav-item" onclick="showTab('calendar',this)" id="nav-calendar">
      <div class="icon">📅</div><div class="label">Calendar</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- FOOD MODAL -->
<div class="modal-overlay" id="foodModalOverlay" onclick="closeFoodModalOnBg(event)">
  <div class="modal" id="foodModal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Food <span class="modal-tag meal-tag" id="modalMealLabel"></span></div>

    <div class="food-search-wrap">
      <input class="food-search-input" id="modalFoodName" placeholder="Search or type food name…" autocomplete="off"
        oninput="onFoodSearch()" onkeydown="onFoodSearchKey(event)">
      <div class="food-suggestions" id="foodSuggestions"></div>
    </div>

    <div class="modal-fields">
      <div class="modal-field full">
        <label>Calories (kcal) *</label>
        <input type="number" id="modalFoodCals" placeholder="e.g. 350">
      </div>
      <div class="modal-field">
        <label>Protein (g)</label>
        <input type="number" id="modalFoodProtein" placeholder="0">
      </div>
      <div class="modal-field">
        <label>Carbs (g)</label>
        <input type="number" id="modalFoodCarbs" placeholder="0">
      </div>
      <div class="modal-field">
        <label>Fat (g)</label>
        <input type="number" id="modalFoodFat" placeholder="0">
      </div>
    </div>

    <div class="modal-btns">
      <button class="btn btn-accent" onclick="submitFoodModal()" style="flex:1;padding:13px">Add to Log</button>
      <button class="btn btn-ghost" onclick="closeFoodModal()" style="padding:13px 18px">Cancel</button>
    </div>
  </div>
</div>

<script>
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

let currentDate=new Date();
let viewDate=new Date();
let selectedDateKey=null;
let prevTab='progress';

// ── Storage ──
function getData(){try{return JSON.parse(localStorage.getItem('fitflow_v3')||'{}')}catch(e){return{}}}
function saveData(d){localStorage.setItem('fitflow_v3',JSON.stringify(d))}
function getProfile(){try{return JSON.parse(localStorage.getItem('fitflow_profile_v2')||'null')}catch(e){return null}}
function storeProfile(p){localStorage.setItem('fitflow_profile_v2',JSON.stringify(p))}

function dateKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}

function getDayData(key){
  const d=getData();
  if(!d[key])d[key]={exercises:[],meals:{breakfast:[],lunch:[],dinner:[],snacks:[]},calGoal:null};
  if(!d[key].meals)d[key].meals={breakfast:[],lunch:[],dinner:[],snacks:[]};
  ['breakfast','lunch','dinner','snacks'].forEach(m=>{if(!d[key].meals[m])d[key].meals[m]=[]});
  return d[key];
}
function saveDayData(key,obj){const d=getData();d[key]=obj;saveData(d)}

// ── Toast ──
function showToast(msg,dur=3200){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);
}

// ── Goal check: calorie within 10% AND protein ≥ 90% of target ──
function isDayGoalMet(key){
  const day=getDayData(key);
  const profile=getProfile();
  const allFood=Object.values(day.meals||{}).flat();
  const eaten=allFood.reduce((s,f)=>s+(f.cals||0),0);
  const protein=allFood.reduce((s,f)=>s+(f.protein||0),0);
  const calTarget=day.calGoal||(profile&&profile.targets?profile.targets.calories:0);
  const protTarget=profile&&profile.targets?profile.targets.protein:0;
  if(!calTarget||!protTarget||eaten===0)return false;
  return eaten>=calTarget*0.9&&eaten<=calTarget*1.1&&protein>=protTarget*0.9;
}

// ══ NAVIGATION ══
function showTab(tab,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-item').forEach(n=>n.classList.remove('active'));
  const pid='page'+tab.charAt(0).toUpperCase()+tab.slice(1);
  document.getElementById(pid).classList.add('active');
  if(el)el.classList.add('active');
  updateHeaderForTab(tab);
  if(tab==='progress')renderProgress();
  else if(tab==='calendar')renderCalendar();
  else if(tab==='daily')renderDaily();
  else if(tab==='profile')renderProfilePage();
}

function updateHeaderForTab(tab){
  const h=document.getElementById('mainHeader');
  const old=h.querySelector('.btn-back');if(old)old.remove();
  const pb=document.getElementById('profileBtn');
  if(tab==='daily'||tab==='profile'){
    const btn=document.createElement('button');
    btn.className='btn-back';btn.innerHTML='← Back';
    const back=prevTab||'progress';
    btn.onclick=()=>{const el=document.getElementById('nav-'+back);showTab(back,el)};
    h.insertBefore(btn,h.querySelector('.header-right'));
    pb.style.display=tab==='profile'?'none':'';
  }else{pb.style.display=''}
}

function currentActiveTab(){
  for(const t of['progress','calendar','daily','profile']){
    if(document.getElementById('page'+t.charAt(0).toUpperCase()+t.slice(1)).classList.contains('active'))return t;
  }return'progress';
}

function openProfile(){
  prevTab=currentActiveTab();
  showTab('profile',null);
}

function gotoToday(){
  prevTab=currentActiveTab();
  selectedDateKey=dateKey(currentDate);
  showTab('daily',document.getElementById('nav-today'));
}

function openDay(key){
  prevTab=currentActiveTab();
  selectedDateKey=key;
  showTab('daily',null);
}

// ══ PROFILE & MACRO CALC ══
function calcTargets(p){
  const w=p.weight*0.453592,h=p.height*2.54;
  let bmr=p.sex==='male'?10*w+6.25*h-5*p.age+5:10*w+6.25*h-5*p.age-161;
  const tdee=bmr*parseFloat(p.activity);
  const defCals=tdee-500;
  const protein=Math.round(p.weight*0.85);
  const fat=Math.round(defCals*0.25/9);
  const carbs=Math.max(Math.round((defCals-protein*4-fat*9)/4),50);
  return{calories:Math.round(defCals),protein,carbs,fat,tdee:Math.round(tdee),bmr:Math.round(bmr)};
}

function saveProfile(){
  const name=document.getElementById('pName').value.trim();
  const sex=document.getElementById('pSex').value;
  const age=parseInt(document.getElementById('pAge').value);
  const weight=parseFloat(document.getElementById('pWeight').value);
  const ft=parseInt(document.getElementById('pHeightFt').value)||0;
  const inch=parseInt(document.getElementById('pHeightIn').value)||0;
  const height=ft*12+inch; // total inches
  const activity=document.getElementById('pActivity').value;
  if(!name){showToast('Please enter your name');return}
  if(!sex){showToast('Please select sex');return}
  if(!age||!weight||!ft){showToast('Please fill in all fields');return}
  const targets=calcTargets({sex,age,weight,height,activity});
  const profile={name,sex,age,weight,height,heightFt:ft,heightIn:inch,activity,targets};
  storeProfile(profile);
  renderProfilePage();
  updateProfileBtn();
  showToast(`✅ Saved! Hi ${name}! Your targets are set.`,4000);
}

function renderProfilePage(){
  const p=getProfile();
  if(p){
    document.getElementById('pName').value=p.name||'';
    document.getElementById('pSex').value=p.sex||'';
    document.getElementById('pAge').value=p.age||'';
    document.getElementById('pWeight').value=p.weight||'';
    document.getElementById('pHeightFt').value=p.heightFt||Math.floor((p.height||0)/12)||'';
    document.getElementById('pHeightIn').value=p.heightIn!==undefined?p.heightIn:((p.height||0)%12)||'';
    document.getElementById('pActivity').value=p.activity||'1.55';
    document.getElementById('profileDisplayName').textContent=p.name;
    const ft=p.heightFt||Math.floor((p.height||0)/12);
    const inch=p.heightIn!==undefined?p.heightIn:(p.height||0)%12;
    document.getElementById('profileDisplaySub').textContent=
      `${p.sex==='male'?'♂ Male':'♀ Female'} · ${p.age} yrs · ${p.weight} lbs · ${ft}'${inch}"`;
    document.getElementById('profileAvatar').textContent=p.sex==='female'?'👩':'👨';
    if(p.targets){
      const t=p.targets;
      document.getElementById('profileTargetsCard').style.display='block';
      document.getElementById('profileTargets').innerHTML=`
        <div class="macro-targets">
          <div class="macro-target"><div class="label">Calories / day</div><div class="value c">${t.calories} kcal</div></div>
          <div class="macro-target"><div class="label">Protein / day</div><div class="value p">${t.protein}g</div></div>
          <div class="macro-target"><div class="label">Carbs / day</div><div class="value ca">${t.carbs}g</div></div>
          <div class="macro-target"><div class="label">Fat / day</div><div class="value f">${t.fat}g</div></div>
        </div>`;
      document.getElementById('profileFormula').innerHTML=
        `BMR: <b>${t.bmr} kcal</b> &nbsp;·&nbsp; TDEE: <b>${t.tdee} kcal</b><br>
         Goal: TDEE − 500 kcal/day ≈ 1 lb/week fat loss<br>
         Protein: ${p.weight} lbs × 0.85 = ${t.protein}g (muscle preservation)<br>
         Calories ✓ = within 10% of target &amp; protein ≥ 90% of goal`;
    }
  }
}

function updateProfileBtn(){
  const p=getProfile();
  const btn=document.getElementById('profileBtn');
  if(p){btn.classList.add('has-profile');btn.textContent=p.sex==='female'?'👩':'👨'}
}

// ══ CALENDAR ══
function changeMonth(dir){viewDate.setMonth(viewDate.getMonth()+dir);renderCalendar()}

function renderCalendar(){
  const y=viewDate.getFullYear(),m=viewDate.getMonth();
  document.getElementById('calMonthLabel').textContent=`${MONTHS[m]} ${y}`;
  const first=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate();
  const todayKey=dateKey(currentDate);
  const data=getData();
  let html='';
  for(let i=0;i<first;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=dim;d++){
    const date=new Date(y,m,d);
    const key=dateKey(date);
    const isToday=key===todayKey;
    const isPast=date<currentDate&&!isToday;
    const hasData=!!data[key]&&(Object.values(data[key].meals||{}).flat().length>0||(data[key].exercises||[]).some(e=>(e.sets||[]).length>0));
    const goalMet=hasData&&isDayGoalMet(key);
    html+=`<div class="cal-day${isToday?' today':''}${isPast?' past':''}${goalMet?' goal-met':''}" onclick="openDay('${key}')">
      ${d}
      <span class="cal-check">✓</span>
      ${hasData&&!goalMet?'<div class="cal-dot"></div>':''}
      ${goalMet?'<div class="cal-dot"></div>':''}
    </div>`;
  }
  document.getElementById('calDays').innerHTML=html;
  // Month stats
  let totalCals=0,daysLogged=0,totalReps=0,goalDays=0;
  for(let d=1;d<=dim;d++){
    const key=dateKey(new Date(y,m,d));
    if(data[key]){
      const meals=data[key].meals||{};
      const c=Object.values(meals).flat().reduce((s,f)=>s+(f.cals||0),0);
      const r=(data[key].exercises||[]).reduce((s,e)=>s+(e.sets||[]).reduce((a,v)=>a+v,0),0);
      if(c>0||r>0){daysLogged++;totalCals+=c;totalReps+=r}
      if(isDayGoalMet(key))goalDays++;
    }
  }
  document.getElementById('monthStats').innerHTML=`
    <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:12px;text-align:center"><div style="font-family:var(--font-mono);font-size:20px;color:var(--accent)">${daysLogged}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase">Days Logged</div></div>
    <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:12px;text-align:center"><div style="font-family:var(--font-mono);font-size:20px;color:var(--accent)">${goalDays} ✓</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase">Goals Met</div></div>
    <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:12px;text-align:center"><div style="font-family:var(--font-mono);font-size:20px;color:var(--text)">${totalReps.toLocaleString()}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase">Total Reps</div></div>
    <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:12px;text-align:center"><div style="font-family:var(--font-mono);font-size:20px;color:var(--accent2)">${(totalCals/1000).toFixed(1)}k</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase">kcal Eaten</div></div>`;
}

// ══ DAILY ══
function renderDaily(){
  if(!selectedDateKey)selectedDateKey=dateKey(currentDate);
  const pts=selectedDateKey.split('-');
  const d=new Date(parseInt(pts[0]),parseInt(pts[1])-1,parseInt(pts[2]));
  document.getElementById('dailyDateBig').textContent=`${MONTHS[d.getMonth()]} ${d.getDate()}`;
  document.getElementById('dailyDateSub').textContent=`${DOW[d.getDay()]} · ${pts[0]}`;
  renderExercises();renderMeals();
}

// ── Exercises ──
function renderExercises(){
  const day=getDayData(selectedDateKey);
  const list=document.getElementById('exerciseList');
  if(!day.exercises||!day.exercises.length){
    list.innerHTML=`<div class="empty-state"><div class="emoji">💪</div>No exercises yet. Add one below!</div>`;
    return;
  }
  list.innerHTML=day.exercises.map((ex,ei)=>{
    const total=(ex.sets||[]).reduce((s,r)=>s+r,0);
    const goal=ex.goal||0;
    const pct=goal>0?Math.min(100,total/goal*100):0;
    const done=goal>0&&total>=goal;
    const sets=(ex.sets||[]).map((r,si)=>
      `<div class="rep-entry"><span>Set ${si+1} — ${r} reps</span><span class="rep-del" onclick="deleteRep(${ei},${si})">×</span></div>`
    ).join('');
    return`<div class="exercise-block">
      <div class="exercise-header">
        <div><div class="exercise-name">${ex.name} ${done?'✅':''}</div>
        <div class="exercise-stats"><strong>${total}</strong> / ${goal||'∞'} reps</div></div>
        <button class="btn btn-danger btn-sm" onclick="deleteExercise(${ei})">Delete</button>
      </div>
      ${goal>0?`<div class="progress-bar"><div class="progress-fill${done?' done':''}" style="width:${pct}%"></div></div>`:''}
      <div class="rep-input-row">
        <input class="input" id="ri_${ei}" type="number" placeholder="Reps" min="1">
        <button class="btn btn-accent btn-sm" onclick="addReps(${ei})">＋ Add</button>
      </div>
      <div class="rep-history">${sets}</div>
      <div style="height:1px;background:var(--border);margin-top:10px"></div>
    </div>`;
  }).join('');
}

function toggleNewExForm(){
  const f=document.getElementById('newExForm');
  f.style.display=f.style.display==='none'?'block':'none';
}

function addExercise(){
  const name=document.getElementById('newExName').value.trim();
  const goal=parseInt(document.getElementById('newExGoal').value)||0;
  if(!name){showToast('Enter exercise name');return}
  const day=getDayData(selectedDateKey);
  day.exercises.push({name,goal,sets:[]});
  saveDayData(selectedDateKey,day);
  document.getElementById('newExName').value='';
  document.getElementById('newExGoal').value='';
  toggleNewExForm();renderExercises();
  showToast(`✅ ${name} added!`);
}

function addReps(ei){
  const inp=document.getElementById(`ri_${ei}`);
  const reps=parseInt(inp.value);
  if(!reps||reps<1){showToast('Enter valid reps');return}
  const day=getDayData(selectedDateKey);
  if(!day.exercises[ei].sets)day.exercises[ei].sets=[];
  day.exercises[ei].sets.push(reps);
  const total=day.exercises[ei].sets.reduce((s,r)=>s+r,0);
  const goal=day.exercises[ei].goal;
  saveDayData(selectedDateKey,day);
  inp.value='';renderExercises();
  if(goal>0&&total>=goal){
    const p=getProfile();
    showToast(`🎉 ${p?'Congrats '+p.name+'! ':''}Goal reached for ${day.exercises[ei].name}!`,4000);
  }
}

function deleteRep(ei,si){
  const day=getDayData(selectedDateKey);
  day.exercises[ei].sets.splice(si,1);
  saveDayData(selectedDateKey,day);renderExercises();
}

function deleteExercise(ei){
  const day=getDayData(selectedDateKey);
  const name=day.exercises[ei].name;
  day.exercises.splice(ei,1);
  saveDayData(selectedDateKey,day);renderExercises();
  showToast(`Deleted ${name}`);
}

// ── Meals ──
const MEAL_LABELS={breakfast:'🍳 Breakfast',lunch:'🥗 Lunch',dinner:'🍽 Dinner',snacks:'🍎 Snacks'};

function renderMeals(){
  const day=getDayData(selectedDateKey);
  const p=getProfile();
  const t=p&&p.targets?p.targets:null;

  // Goal display
  document.getElementById('dailyGoalDisplay').innerHTML=t?
    `<div class="label">Daily Targets (from profile)</div>
     <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:5px;font-family:var(--font-mono);font-size:12px">
       <span style="color:var(--accent2)">${t.calories} kcal</span>
       <span style="color:var(--accent3)">${t.protein}g protein</span>
       <span style="color:var(--warn)">${t.carbs}g carbs</span>
       <span style="color:#a78bfa">${t.fat}g fat</span>
     </div>`:
    `<div class="label" style="color:var(--warn)">⚠ Tap 👤 to set up your profile and get personalized targets</div>`;

  // Totals
  const allFood=Object.values(day.meals||{}).flat();
  const eaten=allFood.reduce((s,f)=>s+(f.cals||0),0);
  const protein=allFood.reduce((s,f)=>s+(f.protein||0),0);
  const carbs=allFood.reduce((s,f)=>s+(f.carbs||0),0);
  const fat=allFood.reduce((s,f)=>s+(f.fat||0),0);

  const pBar=(v,tgt,col)=>tgt?
    `<div style="height:3px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden">
      <div style="height:100%;border-radius:2px;background:${col};width:${Math.min(100,v/tgt*100)}%;transition:width .4s"></div>
    </div>`:'';

  document.getElementById('macroPills').innerHTML=`
    <div class="macro-pill" style="flex:1.5">
      <div class="mv c">${eaten}<span style="font-size:10px;color:var(--muted)">/${t?t.calories:'?'}</span></div>
      <div class="ml">kcal</div>${pBar(eaten,t&&t.calories,'var(--accent2)')}
    </div>
    <div class="macro-pill">
      <div class="mv p">${protein}g</div>
      <div class="ml">protein</div>${pBar(protein,t&&t.protein,'var(--accent3)')}
    </div>
    <div class="macro-pill">
      <div class="mv ca">${carbs}g</div>
      <div class="ml">carbs</div>${pBar(carbs,t&&t.carbs,'var(--warn)')}
    </div>
    <div class="macro-pill">
      <div class="mv f">${fat}g</div>
      <div class="ml">fat</div>${pBar(fat,t&&t.fat,'#a78bfa')}
    </div>`;

  let html='';
  for(const[meal,label]of Object.entries(MEAL_LABELS)){
    const items=(day.meals||{})[meal]||[];
    const mc=items.reduce((s,f)=>s+(f.cals||0),0);
    const ihtml=items.map((f,fi)=>`
      <div class="food-item">
        <div><div>${f.name}</div>${(f.protein||f.carbs||f.fat)?`<div class="food-macros">P:${f.protein||0}g C:${f.carbs||0}g F:${f.fat||0}g</div>`:''}</div>
        <span style="display:flex;align-items:center;gap:8px">
          <span class="food-cals">${f.cals} kcal</span>
          <span class="rep-del" onclick="deleteFood('${meal}',${fi})">×</span>
        </span>
      </div>`).join('');
    html+=`<div class="meal-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="meal-label" style="margin-bottom:0">${label}</div>
        <div style="display:flex;align-items:center;gap:8px">
          ${mc>0?`<div style="font-family:var(--font-mono);font-size:11px;color:var(--accent2)">${mc} kcal</div>`:''}
          <button onclick="openFoodModal('${meal}')" style="width:26px;height:26px;border-radius:50%;background:var(--accent);border:none;color:#0e0f11;font-size:17px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0">+</button>
        </div>
      </div>
      ${ihtml||`<div style="font-size:12px;color:var(--muted);padding:2px 0 8px">Nothing logged yet</div>`}
    </div>`;
  }
  document.getElementById('mealSections').innerHTML=html;
}

// ── Food Database (saved dishes) ──
function getFoodDB(){try{return JSON.parse(localStorage.getItem('fitflow_foods')||'[]')}catch(e){return[]}}
function saveFoodDB(db){localStorage.setItem('fitflow_foods',JSON.stringify(db))}

function saveFoodToDB(item){
  const db=getFoodDB();
  // update if name already exists (case-insensitive), else add
  const idx=db.findIndex(f=>f.name.toLowerCase()===item.name.toLowerCase());
  if(idx>=0)db[idx]=item;else db.unshift(item);
  saveFoodDB(db);
}

// ── Food Modal ──
let modalMeal=null;

function openFoodModal(meal){
  modalMeal=meal;
  const labels={breakfast:'🍳 Breakfast',lunch:'🥗 Lunch',dinner:'🍽 Dinner',snacks:'🍎 Snacks'};
  document.getElementById('modalMealLabel').textContent=labels[meal];
  document.getElementById('modalFoodName').value='';
  document.getElementById('modalFoodCals').value='';
  document.getElementById('modalFoodProtein').value='';
  document.getElementById('modalFoodCarbs').value='';
  document.getElementById('modalFoodFat').value='';
  document.getElementById('foodSuggestions').classList.remove('show');
  document.getElementById('foodModalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('modalFoodName').focus(),350);
}

function closeFoodModal(){
  document.getElementById('foodModalOverlay').classList.remove('open');
  document.getElementById('foodSuggestions').classList.remove('show');
  modalMeal=null;
}

function closeFoodModalOnBg(e){
  if(e.target===document.getElementById('foodModalOverlay'))closeFoodModal();
}

function onFoodSearch(){
  const query=document.getElementById('modalFoodName').value.trim().toLowerCase();
  const sugg=document.getElementById('foodSuggestions');
  if(!query){sugg.classList.remove('show');return}
  const db=getFoodDB();
  const matches=db.filter(f=>f.name.toLowerCase().includes(query)).slice(0,8);
  if(!matches.length){sugg.classList.remove('show');return}
  sugg.innerHTML=matches.map((f,i)=>`
    <div class="food-sugg-item" onclick="selectSuggestion(${i},'${query}')">
      <div class="food-sugg-name">${f.name}</div>
      <div class="food-sugg-meta">${f.cals} kcal · P:${f.protein||0}g C:${f.carbs||0}g F:${f.fat||0}g</div>
    </div>`).join('');
  // store matches in a temp array accessible by index
  sugg._matches=matches;
  sugg.classList.add('show');
}

function onFoodSearchKey(e){
  if(e.key==='Escape'){closeFoodModal();return}
  if(e.key==='Enter'){submitFoodModal();return}
}

function selectSuggestion(idx,query){
  const sugg=document.getElementById('foodSuggestions');
  const item=sugg._matches&&sugg._matches[idx];
  if(!item)return;
  document.getElementById('modalFoodName').value=item.name;
  document.getElementById('modalFoodCals').value=item.cals;
  document.getElementById('modalFoodProtein').value=item.protein||'';
  document.getElementById('modalFoodCarbs').value=item.carbs||'';
  document.getElementById('modalFoodFat').value=item.fat||'';
  sugg.classList.remove('show');
}

function submitFoodModal(){
  const name=document.getElementById('modalFoodName').value.trim();
  const cals=parseInt(document.getElementById('modalFoodCals').value)||0;
  const protein=parseInt(document.getElementById('modalFoodProtein').value)||0;
  const carbs=parseInt(document.getElementById('modalFoodCarbs').value)||0;
  const fat=parseInt(document.getElementById('modalFoodFat').value)||0;
  if(!name||!cals){showToast('Enter food name and calories');return}
  if(!modalMeal){closeFoodModal();return}

  // Save to food DB for future autocomplete
  saveFoodToDB({name,cals,protein,carbs,fat});

  // Add to today's log
  const day=getDayData(selectedDateKey);
  day.meals[modalMeal].push({name,cals,protein,carbs,fat});
  saveDayData(selectedDateKey,day);
  closeFoodModal();
  renderMeals();

  // Check daily goal
  const allFood=Object.values(day.meals).flat();
  const totalEaten=allFood.reduce((s,f)=>s+(f.cals||0),0);
  const totalProtein=allFood.reduce((s,f)=>s+(f.protein||0),0);
  const p=getProfile();
  if(p&&p.targets){
    const calOk=totalEaten>=p.targets.calories*0.9&&totalEaten<=p.targets.calories*1.1;
    const protOk=totalProtein>=p.targets.protein*0.9;
    if(calOk&&protOk)showToast(`🎯 ${p.name}, you hit your daily targets! Great work!`,4500);
  }
}

function deleteFood(meal,fi){
  const day=getDayData(selectedDateKey);
  day.meals[meal].splice(fi,1);
  saveDayData(selectedDateKey,day);renderMeals();
}

// ══ STREAKS & ACHIEVEMENTS ══
function checkStreaks(){
  let streak7=true,streak30=true;
  for(let i=0;i<7;i++){
    const d=new Date(currentDate);d.setDate(d.getDate()-i);
    if(!isDayGoalMet(dateKey(d))){streak7=false;break}
  }
  for(let i=0;i<30;i++){
    const d=new Date(currentDate);d.setDate(d.getDate()-i);
    if(!isDayGoalMet(dateKey(d))){streak30=false;break}
  }
  return{streak7,streak30};
}

function getPoundsLost(){
  const data=getData();const p=getProfile();
  let def=0;
  Object.keys(data).forEach(key=>{
    const day=data[key];
    const allFood=Object.values(day.meals||{}).flat();
    const eaten=allFood.reduce((s,f)=>s+(f.cals||0),0);
    const calTarget=day.calGoal||(p&&p.targets?p.targets.calories:0);
    if(calTarget)def+=(calTarget-eaten);
  });
  return Math.max(0,def/3500);
}

// ══ PROGRESS PAGE ══
function renderProgress(){
  const data=getData();const keys=Object.keys(data);
  const p=getProfile();const name=p?p.name:null;

  let totalEaten=0,totalGoal=0,totalDeficit=0;
  const exTotals={};

  keys.forEach(key=>{
    const day=data[key];
    const allFood=Object.values(day.meals||{}).flat();
    const eaten=allFood.reduce((s,f)=>s+(f.cals||0),0);
    totalEaten+=eaten;
    const calTarget=day.calGoal||(p&&p.targets?p.targets.calories:0);
    if(calTarget){totalGoal+=calTarget;totalDeficit+=(calTarget-eaten)}
    (day.exercises||[]).forEach(ex=>{
      const reps=(ex.sets||[]).reduce((s,r)=>s+r,0);
      exTotals[ex.name]=(exTotals[ex.name]||0)+reps;
    });
  });

  const poundsLost=Math.max(0,totalDeficit/3500);
  const fullPounds=Math.floor(poundsLost);
  const pctToNext=((poundsLost-fullPounds)*100).toFixed(0);
  const calsToNext=totalDeficit>0?Math.round(3500-(totalDeficit%3500)):3500;

  // Achievements
  const{streak7,streak30}=checkStreaks();
  const plost=getPoundsLost();
  const milestones=[5,10,15,20,25,30,35,40,45,50];
  const hit=milestones.filter(m=>plost>=m);
  const latest=hit.length>0?hit[hit.length-1]:0;
  let banners='';
  if(streak30&&name){
    banners+=`<div class="achievement month">🏆 Congratulations ${name} on staying on track this month! That's incredible dedication!</div>`;
  }else if(streak7&&name){
    banners+=`<div class="achievement streak">🔥 Congratulations ${name} on staying on track this week! Keep pushing!</div>`;
  }
  if(latest>0){
    banners+=`<div class="achievement loss">🎉 Congratulations${name?' '+name:''} on losing ${latest} lbs! Great work — keep going!</div>`;
  }
  document.getElementById('achievementBanners').innerHTML=banners;

  // Fat card
  const dots=[];
  for(let i=0;i<Math.max(fullPounds+3,5);i++){
    dots.push(`<div class="pound-dot${i<fullPounds?' filled':''}">${i<fullPounds?'🔥':i+1}</div>`);
  }
  document.getElementById('fatCard').innerHTML=`
    <h3>🔥 Fat Loss Tracker</h3>
    <div style="display:flex;align-items:flex-end;gap:16px;margin-bottom:14px">
      <div>
        <div style="font-size:11px;color:var(--accent);font-family:var(--font-mono);margin-bottom:2px">POUNDS BURNED</div>
        <div style="font-family:var(--font-head);font-size:44px;font-weight:800;color:var(--accent);letter-spacing:-2px">${poundsLost.toFixed(2)}</div>
      </div>
      <div style="margin-bottom:10px">
        <div style="font-size:11px;color:var(--muted2)">Total Deficit</div>
        <div style="font-family:var(--font-mono);color:var(--warn)">${Math.max(0,totalDeficit).toLocaleString()} kcal</div>
      </div>
    </div>
    ${totalDeficit>0?`
      <div style="font-size:12px;color:var(--muted2);margin-bottom:6px">Progress to next pound</div>
      <div class="progress-bar" style="height:8px"><div class="progress-fill" style="width:${pctToNext}%"></div></div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--font-mono)">${calsToNext.toLocaleString()} kcal to next pound</div>
    `:`<div style="font-size:13px;color:var(--muted)">Set up your profile and start logging to track fat loss!</div>`}
    <div class="pound-track">${dots.join('')}</div>
    ${fullPounds>0?`<div style="margin-top:14px;padding:10px;background:rgba(200,245,90,.1);border-radius:8px;text-align:center;font-family:var(--font-head);font-size:13px;color:var(--accent)">🔥 You've burned ${fullPounds} pound${fullPounds>1?'s':''} worth of calories!</div>`:''}
  `;

  // Exercise totals
  const exKeys=Object.keys(exTotals);
  document.getElementById('exerciseTotals').innerHTML=exKeys.length===0?
    `<div style="color:var(--muted);font-size:13px;text-align:center;padding:10px 0">No exercises logged yet</div>`:
    exKeys.map(n=>`<div class="progress-stat"><span class="progress-stat-label">${n}</span><span class="progress-stat-val">${exTotals[n].toLocaleString()} reps</span></div>`).join('');

  // Calorie totals
  const goalDays=keys.filter(k=>isDayGoalMet(k)).length;
  document.getElementById('calorieTotals').innerHTML=`
    <div class="progress-stat"><span class="progress-stat-label">Total Eaten</span><span class="progress-stat-val" style="color:var(--accent2)">${totalEaten.toLocaleString()} kcal</span></div>
    <div class="progress-stat"><span class="progress-stat-label">Total Goal</span><span class="progress-stat-val">${totalGoal.toLocaleString()} kcal</span></div>
    <div class="progress-stat"><span class="progress-stat-label">Net Deficit</span><span class="progress-stat-val" style="color:${totalDeficit>=0?'var(--accent)':'var(--accent2)'}">${totalDeficit>=0?'+':'-'}${Math.abs(totalDeficit).toLocaleString()} kcal</span></div>
    <div class="progress-stat"><span class="progress-stat-label">Days Tracked</span><span class="progress-stat-val">${keys.length}</span></div>
    <div class="progress-stat"><span class="progress-stat-label">Goals Met ✓</span><span class="progress-stat-val" style="color:var(--accent)">${goalDays}</span></div>`;
}

// ══ INIT ══
function init(){
  const today=currentDate;
  document.getElementById('headerDate').textContent=`${MONTHS[today.getMonth()].slice(0,3)} ${today.getDate()}`;
  updateProfileBtn();
  renderProgress();
}

init();
</script>
</body>
</html>
